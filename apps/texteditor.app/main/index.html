<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本编辑器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="editor-container">
        <div class="toolbar">
            <button class="toolbar-btn" id="new-btn">新建</button>
            <button class="toolbar-btn" id="open-btn">打开</button>
            <button class="toolbar-btn" id="save-btn">保存</button>
            <button class="toolbar-btn" id="save-as-btn">另存为</button>
            <div class="toolbar-spacer"></div>
            <input type="text" id="filename-input" placeholder="文件名..." class="filename-input">
        </div>
        <textarea id="editor-textarea" class="editor-textarea" placeholder="在此输入文本..."></textarea>
        <div class="status-bar">
            <span id="char-count">字符: 0</span>
            <span id="line-count">行: 1</span>
            <span id="save-status">未保存</span>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
