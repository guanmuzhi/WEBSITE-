<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影音播放器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <div class="toolbar">
            <div class="toolbar-info">
                <span id="filename" class="filename">未选择文件</span>
                <span id="media-info" class="media-info"></span>
            </div>
        </div>
        <div class="player-wrapper">
            <div class="media-container" id="media-container">
                <video id="media-player"></video>
            </div>
            <div id="audio-mode" class="audio-mode" style="display: none;">
                <div class="audio-cover">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                </div>
                <div class="audio-title" id="audio-title">未选择音频</div>
                <div class="audio-artist" id="audio-artist">未知艺术家</div>
                <div class="audio-waveform" id="audio-waveform">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </div>
            <div id="placeholder" class="placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <p>暂无媒体文件</p>
            </div>
        </div>
        <div class="controls-bar">
            <button class="control-btn" id="prev-btn">⏮</button>
            <button class="control-btn play" id="play-btn">▶</button>
            <button class="control-btn" id="next-btn">⏭</button>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="time-display" id="time-display">00:00 / 00:00</div>
            </div>
            <div class="volume-container">
                <button class="volume-btn" id="volume-btn">🔊</button>
                <div class="volume-slider" id="volume-slider">
                    <div class="volume-fill" id="volume-fill"></div>
                </div>
            </div>
            <select class="speed-selector" id="speed-selector">
                <option value="0.5">0.5×</option>
                <option value="0.75">0.75×</option>
                <option value="1" selected>1×</option>
                <option value="1.25">1.25×</option>
                <option value="1.5">1.5×</option>
                <option value="2">2×</option>
            </select>
            <button class="fullscreen-btn" id="fullscreen-btn">⛶</button>
        </div>
        <div class="status-bar">
            <div class="status-left">
                <span id="status-duration"></span>
                <span id="status-codec"></span>
            </div>
            <div class="status-right">
                <span id="status-type"></span>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
